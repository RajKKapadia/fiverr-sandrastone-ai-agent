services:
  web:
    build:
      context: .
      target: web
    image: admin-dashboard-web
    env_file:
      - .env
    ports:
      - "4100:4100"
    restart: unless-stopped

  discord:
    build:
      context: .
      target: discord
    image: admin-dashboard-discord
    env_file:
      - .env
    restart: unless-stopped
